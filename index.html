<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Mini App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Telegram Mini App</h1>
      <p>নতুন পোস্ট করুন, পড়ুন, লাইক করুন এবং কমেন্ট করুন</p>
    </header>

    <section class="composer">
      <textarea id="postText" placeholder="কিছু লিখুন..." rows="4"></textarea>
      <button id="postButton">পোস্ট করুন</button>
    </section>

    <section class="posts" id="posts"></section>
  </div>

  <script src="app.js"></script>
</body>
</html>
